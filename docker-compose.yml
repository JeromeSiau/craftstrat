services:
  app:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
    ports:
      - "127.0.0.1:8000:80"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - craftstrat

  engine:
    build:
      context: .
      dockerfile: infra/docker/engine.Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - craftstrat

  ml-inference:
    build:
      context: .
      dockerfile: infra/docker/ml-inference.Dockerfile
    environment:
      ML_HOST: 0.0.0.0
      ML_PORT: 8010
      ML_MODEL_DIR: /models/${ML_MODEL_NAME:-btc-15m-xgb-policy}
    volumes:
      - ./ml/artifacts:/models:ro
    restart: unless-stopped
    networks:
      - craftstrat

  ml-trainer:
    build:
      context: .
      dockerfile: infra/docker/ml-inference.Dockerfile
    environment:
      ML_TRAINER_HOST: 0.0.0.0
      ML_TRAINER_PORT: 8011
      ENGINE_INTERNAL_URL: ${ENGINE_INTERNAL_URL:-http://engine:8080}
      ML_MODEL_NAME: ${ML_MODEL_NAME:-btc-15m-xgb-policy}
      ML_ARTIFACTS_DIR: /models
      ML_DATA_DIR: /data
      ML_REFRESH_SLOT_DURATION: ${ML_REFRESH_SLOT_DURATION:-900}
      ML_REFRESH_SYMBOLS: ${ML_REFRESH_SYMBOLS:-BTC}
      ML_REFRESH_HOURS: ${ML_REFRESH_HOURS:-720}
      ML_REFRESH_SAMPLE_EVERY: ${ML_REFRESH_SAMPLE_EVERY:-6}
      ML_REFRESH_LIMIT: ${ML_REFRESH_LIMIT:-5000}
      ML_REFRESH_MAX_ROWS: ${ML_REFRESH_MAX_ROWS:-0}
      ML_TRAIN_VERBOSE_EVAL: ${ML_TRAIN_VERBOSE_EVAL:-50}
      ML_TRAIN_RL_GAMMA: ${ML_TRAIN_RL_GAMMA:-0.999}
      ML_AUTO_PROMOTE_ENABLED: ${ML_AUTO_PROMOTE_ENABLED:-false}
      ML_AUTO_PROMOTE_MIN_ROWS: ${ML_AUTO_PROMOTE_MIN_ROWS:-50000}
      ML_AUTO_PROMOTE_MIN_POLICY_TOTAL_PNL_DELTA: ${ML_AUTO_PROMOTE_MIN_POLICY_TOTAL_PNL_DELTA:-0.0}
      ML_AUTO_PROMOTE_MIN_ENTRY_TOTAL_REWARD_DELTA: ${ML_AUTO_PROMOTE_MIN_ENTRY_TOTAL_REWARD_DELTA:-0.0}
      ML_AUTO_PROMOTE_MIN_EFFICIENCY_RATIO: ${ML_AUTO_PROMOTE_MIN_EFFICIENCY_RATIO:-0.9}
      ML_AUTO_PROMOTE_MAX_DRAWDOWN_RATIO: ${ML_AUTO_PROMOTE_MAX_DRAWDOWN_RATIO:-1.1}
      ML_AUTO_PROMOTE_MIN_TRADE_RATIO: ${ML_AUTO_PROMOTE_MIN_TRADE_RATIO:-0.5}
    volumes:
      - ./ml/artifacts:/models
      - ./ml/data:/data
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    command:
      - sh
      - -lc
      - exec uv run --project /app/ml python /app/ml/serve_trainer.py --host "${ML_TRAINER_HOST:-0.0.0.0}" --port "${ML_TRAINER_PORT:-8011}"
    networks:
      - craftstrat

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_DATABASE:-craftstrat}
      POSTGRES_USER: ${DB_USERNAME:-craftstrat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-craftstrat_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-craftstrat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - craftstrat

  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - craftstrat

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - craftstrat

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - craftstrat

networks:
  craftstrat:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  kafka_data:
